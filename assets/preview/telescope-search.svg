<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="selBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#89b4fa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#89b4fa" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Terminal window frame -->
  <rect width="800" height="500" rx="10" fill="#11111b"/>
  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#181825"/>
  <rect y="22" width="800" height="10" fill="#181825"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086">nvim — Telescope</text>

  <!-- Main editor background -->
  <rect x="8" y="36" width="784" height="456" rx="4" fill="#1e1e2e"/>

  <!-- Telescope border -->
  <rect x="30" y="50" width="740" height="420" rx="6" fill="none" stroke="#45475a" stroke-width="1.5"/>

  <!-- Telescope title -->
  <rect x="30" y="50" width="740" height="30" rx="6" fill="#181825"/>
  <rect x="30" y="70" width="740" height="10" fill="#181825"/>
  <text x="50" y="70" font-family="monospace" font-size="13" fill="#89b4fa" font-weight="bold">  Spotify Search</text>

  <!-- Search prompt -->
  <rect x="30" y="80" width="740" height="32" fill="#11111b"/>
  <text x="50" y="101" font-family="monospace" font-size="13" fill="#f9e2af">🔍 Spotify Search &gt; </text>
  <text x="248" y="101" font-family="monospace" font-size="13" fill="#cdd6f4">blink 182</text>
  <rect x="322" y="89" width="8" height="16" fill="#89b4fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Divider -->
  <line x1="30" y1="112" x2="770" y2="112" stroke="#45475a" stroke-width="1"/>

  <!-- Results panel (left) -->
  <rect x="30" y="112" width="390" height="358" fill="#1e1e2e"/>

  <!-- Result items -->
  <!-- Item 1 - selected -->
  <rect x="32" y="114" width="386" height="26" fill="url(#selBg)"/>
  <rect x="32" y="114" width="3" height="26" fill="#89b4fa"/>
  <text x="48" y="132" font-family="monospace" font-size="12" fill="#f5c2e7">♫</text>
  <text x="68" y="132" font-family="monospace" font-size="12" fill="#cdd6f4">All The Small Things</text>
  <text x="310" y="132" font-family="monospace" font-size="10" fill="#6c7086">blink-182</text>

  <!-- Item 2 -->
  <text x="48" y="158" font-family="monospace" font-size="12" fill="#f5c2e7">♫</text>
  <text x="68" y="158" font-family="monospace" font-size="12" fill="#bac2de">I Miss You</text>
  <text x="310" y="158" font-family="monospace" font-size="10" fill="#6c7086">blink-182</text>

  <!-- Item 3 -->
  <text x="48" y="184" font-family="monospace" font-size="12" fill="#f5c2e7">♫</text>
  <text x="68" y="184" font-family="monospace" font-size="12" fill="#bac2de">What's My Age Again?</text>
  <text x="310" y="184" font-family="monospace" font-size="10" fill="#6c7086">blink-182</text>

  <!-- Item 4 -->
  <text x="48" y="210" font-family="monospace" font-size="12" fill="#f5c2e7">♫</text>
  <text x="68" y="210" font-family="monospace" font-size="12" fill="#bac2de">Dammit</text>
  <text x="310" y="210" font-family="monospace" font-size="10" fill="#6c7086">blink-182</text>

  <!-- Item 5 -->
  <text x="48" y="236" font-family="monospace" font-size="12" fill="#f5c2e7">♫</text>
  <text x="68" y="236" font-family="monospace" font-size="12" fill="#bac2de">Adam's Song</text>
  <text x="310" y="236" font-family="monospace" font-size="10" fill="#6c7086">blink-182</text>

  <!-- Item 6 - album -->
  <text x="48" y="262" font-family="monospace" font-size="12" fill="#89b4fa">💿</text>
  <text x="68" y="262" font-family="monospace" font-size="12" fill="#bac2de">Enema of the State</text>
  <text x="310" y="262" font-family="monospace" font-size="10" fill="#585b70">Album</text>

  <!-- Item 7 - album -->
  <text x="48" y="288" font-family="monospace" font-size="12" fill="#89b4fa">💿</text>
  <text x="68" y="288" font-family="monospace" font-size="12" fill="#bac2de">Take Off Your Pants...</text>
  <text x="310" y="288" font-family="monospace" font-size="10" fill="#585b70">Album</text>

  <!-- Item 8 - artist -->
  <text x="48" y="314" font-family="monospace" font-size="12" fill="#a6e3a1">🎤</text>
  <text x="68" y="314" font-family="monospace" font-size="12" fill="#bac2de">blink-182</text>
  <text x="310" y="314" font-family="monospace" font-size="10" fill="#585b70">Artist</text>

  <!-- Item 9 - playlist -->
  <text x="48" y="340" font-family="monospace" font-size="12" fill="#f9e2af">📋</text>
  <text x="68" y="340" font-family="monospace" font-size="12" fill="#bac2de">blink-182 Greatest Hits</text>
  <text x="310" y="340" font-family="monospace" font-size="10" fill="#585b70">Playlist</text>

  <!-- Item 10 - playlist -->
  <text x="48" y="366" font-family="monospace" font-size="12" fill="#f9e2af">📋</text>
  <text x="68" y="366" font-family="monospace" font-size="12" fill="#bac2de">Pop Punk Classics</text>
  <text x="310" y="366" font-family="monospace" font-size="10" fill="#585b70">Playlist</text>

  <!-- Results count -->
  <text x="50" y="450" font-family="monospace" font-size="10" fill="#585b70">10 / 47 results</text>

  <!-- Vertical divider -->
  <line x1="420" y1="112" x2="420" y2="470" stroke="#45475a" stroke-width="1"/>

  <!-- Preview pane (right) -->
  <rect x="420" y="112" width="350" height="358" fill="#181825" rx="0"/>

  <!-- Preview header -->
  <text x="440" y="142" font-family="monospace" font-size="11" fill="#6c7086">── Track Preview ──────────────────</text>

  <!-- Album art placeholder -->
  <rect x="530" y="158" width="120" height="120" rx="4" fill="#313244"/>
  <rect x="534" y="162" width="112" height="112" rx="2" fill="#1e1e2e"/>
  <text x="590" y="218" text-anchor="middle" font-family="monospace" font-size="28" fill="#45475a">♫</text>
  <text x="590" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#45475a">Album Art</text>

  <!-- Track details -->
  <text x="440" y="310" font-family="monospace" font-size="11" fill="#585b70">Title</text>
  <text x="440" y="326" font-family="monospace" font-size="13" fill="#cdd6f4" font-weight="bold">All The Small Things</text>

  <text x="440" y="350" font-family="monospace" font-size="11" fill="#585b70">Artist</text>
  <text x="440" y="366" font-family="monospace" font-size="13" fill="#89b4fa">blink-182</text>

  <text x="440" y="390" font-family="monospace" font-size="11" fill="#585b70">Album</text>
  <text x="440" y="406" font-family="monospace" font-size="13" fill="#a6e3a1">Enema of the State</text>

  <text x="440" y="426" font-family="monospace" font-size="11" fill="#585b70">Duration</text>
  <text x="510" y="426" font-family="monospace" font-size="11" fill="#cdd6f4">2:47</text>

  <!-- Popularity bar -->
  <text x="440" y="448" font-family="monospace" font-size="11" fill="#585b70">Popularity</text>
  <rect x="530" y="438" width="100" height="8" rx="4" fill="#313244"/>
  <rect x="530" y="438" width="82" height="8" rx="4" fill="#a6e3a1"/>
  <text x="640" y="448" font-family="monospace" font-size="10" fill="#6c7086">82%</text>

  <!-- Bottom keybinds -->
  <rect x="30" y="454" width="740" height="16" fill="#11111b"/>
  <text x="50" y="466" font-family="monospace" font-size="10" fill="#585b70">&lt;CR&gt; Play  &lt;C-a&gt; Add to Queue  &lt;C-s&gt; Save  &lt;Tab&gt; Toggle Type  &lt;Esc&gt; Close</text>
</svg>
