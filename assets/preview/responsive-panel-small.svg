<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="smallShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="smallProgress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
  </defs>

  <!-- Editor background -->
  <rect width="800" height="500" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#181825"/>
  <rect y="22" width="800" height="10" fill="#181825"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086">nvim — init.lua</text>

  <!-- Background code content -->
  <g opacity="0.85">
    <text x="20" y="58" font-family="monospace" font-size="11" fill="#45475a"> 1</text>
    <text x="50" y="58" font-family="monospace" font-size="11" fill="#6c7086">-- nowplaying.nvim config</text>

    <text x="20" y="76" font-family="monospace" font-size="11" fill="#45475a"> 2</text>
    <text x="50" y="76" font-family="monospace" font-size="11" fill="#cba6f7">local</text>
    <text x="86" y="76" font-family="monospace" font-size="11" fill="#cdd6f4"> np = </text>
    <text x="128" y="76" font-family="monospace" font-size="11" fill="#89b4fa">require</text>
    <text x="176" y="76" font-family="monospace" font-size="11" fill="#a6e3a1">("nowplaying")</text>

    <text x="20" y="94" font-family="monospace" font-size="11" fill="#45475a"> 3</text>

    <text x="20" y="112" font-family="monospace" font-size="11" fill="#45475a"> 4</text>
    <text x="50" y="112" font-family="monospace" font-size="11" fill="#cdd6f4">np.</text>
    <text x="72" y="112" font-family="monospace" font-size="11" fill="#89b4fa">setup</text>
    <text x="106" y="112" font-family="monospace" font-size="11" fill="#cdd6f4">({</text>

    <text x="20" y="130" font-family="monospace" font-size="11" fill="#45475a"> 5</text>
    <text x="50" y="130" font-family="monospace" font-size="11" fill="#89b4fa">  panel</text>
    <text x="92" y="130" font-family="monospace" font-size="11" fill="#cdd6f4"> = {</text>

    <text x="20" y="148" font-family="monospace" font-size="11" fill="#45475a"> 6</text>
    <text x="50" y="148" font-family="monospace" font-size="11" fill="#89b4fa">    width</text>
    <text x="96" y="148" font-family="monospace" font-size="11" fill="#cdd6f4"> = </text>
    <text x="116" y="148" font-family="monospace" font-size="11" fill="#fab387">30</text>
    <text x="132" y="148" font-family="monospace" font-size="11" fill="#cdd6f4">,</text>

    <text x="20" y="166" font-family="monospace" font-size="11" fill="#45475a"> 7</text>
    <text x="50" y="166" font-family="monospace" font-size="11" fill="#89b4fa">    responsive</text>
    <text x="138" y="166" font-family="monospace" font-size="11" fill="#cdd6f4"> = </text>
    <text x="158" y="166" font-family="monospace" font-size="11" fill="#fab387">true</text>
    <text x="190" y="166" font-family="monospace" font-size="11" fill="#cdd6f4">,</text>

    <text x="20" y="184" font-family="monospace" font-size="11" fill="#45475a"> 8</text>
    <text x="50" y="184" font-family="monospace" font-size="11" fill="#cdd6f4">  },</text>

    <text x="20" y="202" font-family="monospace" font-size="11" fill="#45475a"> 9</text>
    <text x="50" y="202" font-family="monospace" font-size="11" fill="#cdd6f4">})</text>

    <text x="20" y="220" font-family="monospace" font-size="11" fill="#45475a">10</text>

    <text x="20" y="238" font-family="monospace" font-size="11" fill="#45475a">11</text>
    <text x="50" y="238" font-family="monospace" font-size="11" fill="#6c7086">-- Keymaps</text>

    <text x="20" y="256" font-family="monospace" font-size="11" fill="#45475a">12</text>
    <text x="50" y="256" font-family="monospace" font-size="11" fill="#cdd6f4">vim.keymap.</text>
    <text x="138" y="256" font-family="monospace" font-size="11" fill="#89b4fa">set</text>
    <text x="162" y="256" font-family="monospace" font-size="11" fill="#cdd6f4">(</text>
    <text x="170" y="256" font-family="monospace" font-size="11" fill="#a6e3a1">"n"</text>
    <text x="196" y="256" font-family="monospace" font-size="11" fill="#cdd6f4">,</text>

    <text x="20" y="274" font-family="monospace" font-size="11" fill="#45475a">13</text>
    <text x="50" y="274" font-family="monospace" font-size="11" fill="#a6e3a1">  "&lt;leader&gt;mp"</text>
    <text x="170" y="274" font-family="monospace" font-size="11" fill="#cdd6f4">,</text>

    <text x="20" y="292" font-family="monospace" font-size="11" fill="#45475a">14</text>
    <text x="50" y="292" font-family="monospace" font-size="11" fill="#cdd6f4">  np.toggle_panel</text>

    <text x="20" y="310" font-family="monospace" font-size="11" fill="#45475a">15</text>
    <text x="50" y="310" font-family="monospace" font-size="11" fill="#cdd6f4">)</text>

    <!-- More lines fading out -->
    <text x="20" y="328" font-family="monospace" font-size="11" fill="#45475a">16</text>
    <text x="20" y="346" font-family="monospace" font-size="11" fill="#45475a">17</text>
    <text x="50" y="346" font-family="monospace" font-size="11" fill="#6c7086">-- Toggle with &lt;leader&gt;mp</text>
    <text x="20" y="364" font-family="monospace" font-size="11" fill="#45475a">18</text>
    <text x="20" y="382" font-family="monospace" font-size="11" fill="#45475a">19</text>
    <text x="50" y="382" font-family="monospace" font-size="11" fill="#cba6f7">return</text>
    <text x="95" y="382" font-family="monospace" font-size="11" fill="#cdd6f4"> {}</text>
  </g>

  <!-- Small compact floating panel -->
  <g filter="url(#smallShadow)">
    <rect x="510" y="55" width="255" height="90" rx="6" fill="#181825"/>
    <rect x="510" y="55" width="255" height="90" rx="6" fill="none" stroke="#cba6f7" stroke-width="1.5" stroke-opacity="0.7"/>
  </g>

  <!-- Panel header -->
  <text x="524" y="74" font-family="monospace" font-size="10" fill="#cba6f7">♫</text>
  <text x="538" y="74" font-family="monospace" font-size="10" fill="#6c7086">Now Playing</text>
  <text x="748" y="74" font-family="monospace" font-size="10" fill="#45475a">✕</text>

  <!-- Track title -->
  <text x="524" y="96" font-family="monospace" font-size="13" fill="#cdd6f4" font-weight="bold">All The Small Things</text>

  <!-- Artist -->
  <text x="524" y="113" font-family="monospace" font-size="11" fill="#89b4fa">blink-182</text>

  <!-- Thin progress bar -->
  <rect x="524" y="124" width="225" height="4" rx="2" fill="#313244"/>
  <rect x="524" y="124" width="133" height="4" rx="2" fill="url(#smallProgress)"/>

  <!-- Time labels -->
  <text x="524" y="140" font-family="monospace" font-size="9" fill="#585b70">2:14</text>
  <text x="730" y="140" font-family="monospace" font-size="9" fill="#585b70">3:47</text>

  <!-- Annotation: arrow showing what's hidden -->
  <g opacity="0.9">
    <!-- "Small mode" label -->
    <rect x="518" y="160" width="240" height="24" rx="12" fill="#313244"/>
    <text x="638" y="176" text-anchor="middle" font-family="monospace" font-size="10" fill="#cba6f7">▸ Responsive: Small (30 cols)</text>
  </g>

  <!-- Comparison annotation -->
  <g transform="translate(70, 410)">
    <rect x="0" y="0" width="660" height="56" rx="8" fill="#11111b" opacity="0.9"/>
    <rect x="0" y="0" width="660" height="56" rx="8" fill="none" stroke="#313244" stroke-width="1"/>

    <text x="24" y="22" font-family="monospace" font-size="11" fill="#585b70">Auto-hidden in small mode:</text>

    <text x="24" y="42" font-family="monospace" font-size="11" fill="#f38ba8">✗ Album art</text>
    <text x="155" y="42" font-family="monospace" font-size="11" fill="#f38ba8">✗ Album name</text>
    <text x="310" y="42" font-family="monospace" font-size="11" fill="#f38ba8">✗ Controls</text>
    <text x="430" y="42" font-family="monospace" font-size="11" fill="#f38ba8">✗ Volume</text>
    <text x="540" y="42" font-family="monospace" font-size="11" fill="#f38ba8">✗ Visualizer</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="478" width="800" height="22" rx="0" fill="#181825"/>
  <text x="15" y="493" font-family="monospace" font-size="10" fill="#a6e3a1"> NORMAL</text>
  <text x="90" y="493" font-family="monospace" font-size="10" fill="#585b70">│ init.lua │ lua │ utf-8 │ LF</text>
  <text x="660" y="493" font-family="monospace" font-size="10" fill="#585b70">Ln 7, Col 21</text>
</svg>
